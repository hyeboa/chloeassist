<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChloeAssist 초기화</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #4f46e5;
      --line: #e5e7eb;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #eef2ff 0%, var(--bg) 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    .card {
      width: min(560px, calc(100vw - 32px));
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      padding: 28px;
    }
    h1 { margin: 0 0 12px; font-size: 1.5rem; }
    p { margin: 0 0 12px; color: var(--muted); line-height: 1.7; }
    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .danger { color: var(--danger); font-weight: 700; }
    .done {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .done[hidden] { display: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>데이터 초기화</h1>
    <p>이 페이지를 열면 ChloeAssist의 브라우저 저장 데이터를 모두 지웁니다.</p>
    <p class="danger">되돌릴 수 없습니다.</p>
    <div id="status" class="status">초기화 준비 중...</div>
    <a id="back" class="done" href="/" hidden>홈으로 돌아가기</a>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const backEl = document.getElementById('back');

    function setStatus(message) {
      statusEl.textContent = message;
    }

    async function clearBrowserStorage() {
      try { localStorage.clear(); } catch {}
      try { sessionStorage.clear(); } catch {}
      try {
        if (window.indexedDB && typeof indexedDB.databases === 'function') {
          const dbs = await indexedDB.databases();
          for (const db of dbs) {
            if (db && db.name) indexedDB.deleteDatabase(db.name);
          }
        }
      } catch {}
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch {}
      try {
        if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
      } catch {}
    }

    async function run() {
      setStatus('브라우저 저장소를 지우는 중...');
      await clearBrowserStorage();
      setStatus('초기화가 완료됐습니다.\n브라우저 저장소를 모두 비웠습니다.');
      backEl.hidden = false;
    }

    run().catch((err) => {
      setStatus(`초기화 중 오류가 발생했습니다.\n${err?.message || err}`);
      backEl.hidden = false;
    });
  </script>
</body>
</html>
