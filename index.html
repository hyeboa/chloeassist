<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 — 헬로아지</title>
  <link rel="stylesheet"  href="assets/css/base.css?v=20260525d">
  <link rel="stylesheet"  href="assets/css/layout.css?v=20260525d">
  <link rel="stylesheet"  href="assets/css/assistant.css?v=20260525d">
  <link rel="stylesheet"  href="assets/css/modules/dashboard.css?v=20260525d">
</head>
<body>
  <div class="app-layout">
    <!-- 사이드바: nav.js가 주입 -->
    <div class="main-wrapper">
      <header class="page-header">
        <span class="page-title">오늘</span>
        <div class="page-header-actions">
          <span id="clock" style="font-size:0.85rem;color:var(--color-text-3)"></span>
        </div>
      </header>
      <main class="page-content">
        <div id="app"></div>
      </main>
    </div>
  </div>

  <script  src="assets/js/seed.js?v=20260525d"></script>
  <script  src="assets/js/core/store.js?v=20260525d"></script>
  <script  src="assets/js/core/ai.js?v=20260525d"></script>
  <script  src="assets/js/components/toast.js?v=20260525d"></script>
  <script  src="assets/js/components/nl-input.js?v=20260525d"></script>
  <script  src="assets/js/components/nav.js?v=20260525d"></script>
  <script  src="assets/js/components/assistant.js?v=20260525d"></script>
  <script  src="assets/js/modules/dashboard.js?v=20260525d"></script>
  <script  src="assets/js/components/banner.js?v=20260525d"></script>
  <script  src="assets/js/app.js?v=20260525d"></script>
  <script>
    // 시계
    function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }
    tick();
    setInterval(tick, 60000);
  </script>
</body>
</html>
